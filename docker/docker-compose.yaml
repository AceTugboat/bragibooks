services:
  # Development: Django runserver + frontend built assets + task worker in one container
  bragi-dev:
    image: bragibooks
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: bragibooks
    command: dev
    profiles:
      - development
    environment:
      - LOG_LEVEL=DEBUG
      - DEBUG=True
      - UID=1001
      - GID=1001
      - RUN_WORKER=true
    volumes:
      - $HOME/Projects/bragibooks:/home/app/web
      - $HOME/Projects/demo/config:/config
      - $HOME/Projects/demo/completed/audiobooks:/input
      - $HOME/Projects/demo/output/audiobooks:/output
      - $HOME/Projects/demo/converted:/done
    ports:
      - 8000:8000
    restart: unless-stopped

  # Production: Gunicorn web server with PostgreSQL — pair with the worker service or set RUN_WORKER=true
  bragi:
    image: acetugboat/bragibooks
    container_name: bragibooks
    command: prod
    profiles:
      - production
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=False
      - UID=1001
      - GID=1001
      - RUN_WORKER=false
      # Set this to your deployment domain to configure CORS and CSRF
      # - HOSTED_DOMAIN=yourdomain.com
      # Required for passkey authentication — must match your deployment domain
      # - PASSKEY_RP_ID=yourdomain.com
      # - PASSKEY_RP_NAME=Bragibooks
      # - PASSKEY_ORIGIN=https://yourdomain.com
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=bragibooks
      - DB_PASSWORD=bragibooks
      - DB_NAME=bragibooks
    volumes:
      - /downloads:/downloads # Map to where files are downloaded for processing
      - /audiobooks:/audiobooks # Map to where processed audiobooks are stored
      - /config:/config
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  # Worker: Standalone task queue processor — run alongside the production web container
  worker:
    image: acetugboat/bragibooks
    container_name: bragibooks-worker
    command: worker
    profiles:
      - production
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=False
      - UID=1001
      - GID=1001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=bragibooks
      - DB_PASSWORD=bragibooks
      - DB_NAME=bragibooks
    volumes:
      - /downloads:/downloads
      - /audiobooks:/audiobooks
      - /config:/config
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    container_name: bragibooks_db
    profiles:
      - production
    environment:
      - POSTGRES_DB=bragibooks
      - POSTGRES_USER=bragibooks
      - POSTGRES_PASSWORD=bragibooks
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
